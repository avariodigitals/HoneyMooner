    <style>
      body {
        margin: 0;
        background: #4a352f;
      }

      #app-initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: radial-gradient(circle at 22% 20%, rgba(193, 138, 123, 0.32), transparent 45%), #4a352f;
        color: #f2e8e5;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 220ms ease;
      }

      #app-initial-loader .loader-ring {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(242, 232, 229, 0.25);
        border-top-color: #e2c2b9;
        border-radius: 999px;
        animation: loader-spin 0.8s linear infinite;
      }

      #app-initial-loader .loader-label {
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        opacity: 0.92;
      }

      body.app-booted #app-initial-loader {
        opacity: 0;
        pointer-events: none;
      }

      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-initial-loader" aria-hidden="true">
      <div class="loader-ring"></div>
      <div class="loader-label">The Honeymooner Travel</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
